name: Build and deploy Node.js app to Azure Web App - RD

on:
  push:
    branches:
      - main
    paths:
      - 'server/**' # Only trigger when the backend changes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        working-directory: ./server # Moves context to the backend folder
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./server # Only uploads the backend files

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./server-app # Extracts to a specific folder to avoid root clutter

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0500CD2A937C4C0E94986E9ED1B3778F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DEEE86A2ABBF4453904E828630E9C2E4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_88CB0925CBA047B9907357C99846DA91 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'RD'
          slot-name: 'Production'
          package: ./server-app # Deploys only the backend code
