name: Build and deploy Node.js app to Azure Web App - RD

on:
  push:
    branches:
      - main
    paths:
      - 'server/**' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4 
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        working-directory: ./server
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4 
        with:
          name: node-app
          path: ./server # Packages only the backend contents

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # OIDC permissions (id-token) are no longer required for Publish Profile
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4 
        with:
          name: node-app
          path: ./server-app 

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'RD'
          slot-name: 'Production'
          # Use the Publish Profile secret instead of the login step
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./server-app
